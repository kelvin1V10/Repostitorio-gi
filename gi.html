<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Ela ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #141414;
      color: #fff;
      overflow-x: hidden;
    }

    /* --- TELA DE LOGIN --- */
    .login-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #000;
      transition: all 0.6s ease;
      z-index: 1000;
      position: relative;
      padding: 20px;
    }

    .login-screen h1 {
      font-size: clamp(24px, 8vw, 40px);
      margin-bottom: 40px;
      text-align: center;
    }

    .profiles {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .profile {
      text-align: center;
      cursor: pointer;
      width: clamp(120px, 40vw, 160px);
    }

    .profile img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 4px;
      border: 3px solid transparent;
      transition: 0.3s;
    }

    .profile:hover img {
      border: 3px solid #fff;
      transform: scale(1.05);
    }

    .profile p {
      margin-top: 10px;
      color: #ccc;
      font-size: 14px;
    }

    /* --- APP PRINCIPAL --- */
    .app {
      display: none;
      opacity: 0;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 5%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .logo-text {
      color: #e50914;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: bold;
      letter-spacing: 2px;
    }

    .kelvin-trigger {
      background: #e50914;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    /* --- BANNER --- */
    .banner {
      height: 70vh;
      position: relative;
      display: flex;
      align-items: center; 
      padding: 0 5%;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      opacity: 0.5;
    }

    .banner::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to top, #141414 15%, transparent 70%);
      z-index: 1;
    }

    .banner-content {
      position: relative;
      z-index: 5;
      max-width: 600px;
    }

    .banner h2 { font-size: clamp(32px, 10vw, 60px); font-weight: bold; margin-bottom: 10px; }
    .banner p { margin-bottom: 20px; font-size: clamp(14px, 4vw, 20px); color: #ddd; }

    .buttons { display: flex; gap: 10px; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .play { background: #fff; color: #000; }
    .info { background: rgba(109, 109, 110, 0.7); color: #fff; }

    /* --- LISTAS DE FOTOS --- */
    .content-lists {
      position: relative;
      z-index: 10;
      margin-top: -60px;
      padding-bottom: 40px;
    }

    .row { padding: 15px 0 15px 5%; }
    .row h2 { font-size: clamp(16px, 5vw, 22px); margin-bottom: 10px; font-weight: 600; }

    .cards {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 20px 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .cards::-webkit-scrollbar { display: none; }

    .card {
      min-width: clamp(160px, 45vw, 300px);
      height: clamp(100px, 25vw, 180px);
      border-radius: 6px;
      cursor: pointer;
      background: #222;
      flex-shrink: 0;
      position: relative;
      border: 3px solid transparent;
      transition: transform 0.4s ease, border 0.4s ease, box-shadow 0.4s ease;
      overflow: hidden;
    }

    .card img { width: 100%; height: 100%; object-fit: cover; }

    .card:hover {
      transform: scale(1.1);
      border: 3px solid #e50914; 
      z-index: 20;
      box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.6);
    }

    /* --- MODAL PEGADINHA --- */
    .modal-kelvin {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 5000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .btn-sim {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      position: absolute;
      transition: all 0.2s ease;
    }

    .btn-certeza {
      background: #e50914;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      margin-top: 200px;
      cursor: pointer;
      font-weight: bold;
    }

    /* --- OUTROS --- */
    .heart-particle { position: fixed; color: #e50914; font-size: 20px; pointer-events: none; animation: flyUp 1s ease-out forwards; z-index: 6000; }
    @keyframes flyUp { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -120px) scale(1.5) rotate(20deg); opacity: 0; } }

    .mensagem { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #181818; padding: 30px; border-radius: 10px; text-align: center; z-index: 3000; width: 85%; max-width: 350px; }
  </style>
</head>

<body>

  <div class="login-screen" id="login">
    <h1>Quem está assistindo?</h1>
    <div class="profiles">
      <div class="profile" onclick="entrar()">
        <img src="WhatsApp Image 2026-04-24 at 13.35.03 (2).jpeg">
        <p>Poxa Gi ❤️</p>
      </div>
    </div>
  </div>

  <div class="app" id="app">
    <header>
      <div class="logo-text">NETFLIX ❤️</div>
      <button class="kelvin-trigger" onclick="abrirKelvin()">Kelvin</button>
    </header>

    <section class="banner">
      <video autoplay muted loop playsinline class="bg-video">
        <source src="WhatsApp Video 2026-04-24 at 13.53.56.mp4" type="video/mp4">
      </video>
      <div class="banner-content">
        <h2>Ela ✨</h2>
        <p>Se fosse um filme, você seria meu favorito pra sempre 💖</p>
        <div class="buttons">
          <button class="btn play" onclick="mostrarMensagem()"><span>▶</span> Assistir</button>
          <button class="btn info"><span>ℹ</span> Mais info</button>
        </div>
      </div>
    </section>

    <div class="content-lists">
      <section class="row">
        <h2>Mais gatinha que existe 💕</h2>
        <div class="cards">
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 13.35.04.jpeg"></div>
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 13.35.04 (1).jpeg"></div>
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 13.35.02.jpeg"></div>
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 13.35.04 (2).jpeg"></div>
        </div>
      </section>

      <section class="row">
        <h2>Beleza inexplicável ❤️</h2>
        <div class="cards">
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 14.07.37.jpeg"></div>
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 13.35.03.jpeg"></div>
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsApp Image 2026-04-24 at 13.35.03 (1).jpeg"></div>
          <div class="card" onclick="spawnHearts(event)"><img src="WhatsAepp Image 2026-04-24 at 14.07.36.jpeg"></div>
        </div>
      </section>
    </div>
  </div>

  <div class="modal-kelvin" id="modalKelvin">
    <h2>Gosta do Kelvin?</h2>
    <button id="btnSim" class="btn-sim" onclick="fugir()">SIM</button>
    <button class="btn-certeza" onclick="finalizar()">Com certeza! ❤️</button>
  </div>

  <div class="mensagem" id="mensagem">
    <p>Você é minha história favorita ❤️</p>
    <button style="margin-top:20px; padding:10px 20px; cursor:pointer;" onclick="fecharMensagem()">Fechar</button>
  </div>

  <script>
    function entrar() {
      const login = document.getElementById('login');
      const app = document.getElementById('app');
      login.style.opacity = '0';
      setTimeout(() => {
        login.style.display = 'none';
        app.style.display = 'block';
        setTimeout(() => app.style.opacity = '1', 50);
      }, 600);
    }

    function abrirKelvin() {
      document.getElementById('modalKelvin').style.display = 'flex';
      const btn = document.getElementById('btnSim');
      btn.style.left = '50%'; btn.style.top = '45%'; btn.style.transform = 'translate(-50%, -50%)';
    }

    function fugir() {
      const btn = document.getElementById('btnSim');
      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 60);
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      btn.style.transform = 'none';
    }

    function finalizar() { alert("Eu tbm gosto de vc gatinha <3"); document.getElementById('modalKelvin').style.display = 'none'; }
    function mostrarMensagem() { document.getElementById('mensagem').style.display = 'block'; }
    function fecharMensagem() { document.getElementById('mensagem').style.display = 'none'; }

    function spawnHearts(e) {
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      for (let i = 0; i < 5; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-particle';
        heart.innerHTML = '❤️';
        heart.style.left = clientX + 'px'; heart.style.top = clientY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
      }
    }
  </script>
</body>
</html>
